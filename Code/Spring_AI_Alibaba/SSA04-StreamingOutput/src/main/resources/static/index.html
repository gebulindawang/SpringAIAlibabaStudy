<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE流式返回+多模型共存</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        #messageInput {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #4CAF50;
            color: white;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #messages {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            min-height: 100px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        .model-selector {
            margin-bottom: 10px;
        }
        select {
            padding: 8px;
            font-size: 14px;
            margin-left: 10px;
        }
        .user-message {
            color: #333;
            margin: 10px 0;
        }
        .ai-message {
            color: #0066cc;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        .streaming {
            border-left: 3px solid #4CAF50;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>SSE流式返回 + 多模型共存演示</h1>

    <textarea id="messageInput" rows="4" cols="50" placeholder="请输入你的问题..."></textarea><br>
    <button onclick="sendMsg()">发送提问</button>
    <div id="messages">
        <script>
            function sendMsg(){
                const message = document.getElementById("messageInput").value;
                if (message === "" || message.trim() === "" ) {
                    alert("请输入有效的问题！");
                    return;
                }
                const eventSource = new EventSource('/streamOutput/deepseekClient?question =' + message);
                eventSource.onmessage = function (event) {
                    const data = event.data;
                    const messagesDiv = document.getElementById("messages");
                    messagesDiv.innerHTML += data;
                };
                eventSource.onerror = function (error) {
                    console.error("Error:", error);
                    eventSource.close();
                };
            }
        </script>
    </div>



</body>
</html>
